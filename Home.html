<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Trype</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:Inter,Segoe UI,sans-serif;
    color:white;
    display:grid;
    place-items:center;
    overflow:hidden;
}

.bg{
    position:fixed;
    inset:0;
    background-size: cover;
    background-repeat: no-repeat;
    z-index:-2;
    background:
        linear-gradient(rgba(8, 12, 22, 0.87),rgba(8, 12, 22, 0.59)), url("/home/nathan/Downloads/file.png") center/cover no-repeat
}

#title{
    transition: text-shadow 0.3s ease-in-out;
    cursor: pointer;
    margin: 0;
    font-size:4rem;
    font-weight:700;
    letter-spacing:3px;
    color:#f5f9ff;
    text-shadow:
        0 0 10px #3b83f6ca,
        0 0 25px rgba(59, 131, 246, 0.572);
}
#title:hover{
    margin: 0;
    font-size:4rem;
    font-weight:700;
    letter-spacing:3px;
    color:#f5f9ff;
    text-shadow:
        0 0 10px #5395ff,
        0 0 25px rgba(82, 149, 255, 0.769);
}

.selection{
    width:min(1100px,90vw);

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:32px;

    align-items:center;
    justify-items:center;
}

.card{
    width:100%;
    background-size: 8%;
    aspect-ratio:16/10;

    border-radius:20px;

    background:rgba(24,24,30,.55);
    backdrop-filter:blur(14px);

    border:1px solid rgba(55, 135, 255, 0.579);

    box-shadow:
        0 10px 30px rgba(0,0,0,.35);

    transition:
        transform .25s ease,
        box-shadow .25s ease,
        border-color .25s ease,
        background-position .5s ease;

    cursor:pointer;
}

.card:hover{
    transform:translateY(-8px);
    border-color:#4d9fff;

    box-shadow:
        0 18px 45px rgba(59,130,246,.35),
        0 0 25px rgba(59,130,246,.25);
}

.card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:inherit;
    background:
        linear-gradient(145deg,
        rgba(255,255,255,.08),
        transparent 45%);
    pointer-events:none;
}
.titlediv {
    position: absolute;
    top: 45px;

    display: grid;
    grid-template-columns: auto auto;
    align-items: center;
    gap: 12px;
}
.logo-card{
    cursor: pointer;
    width:72px;
    height:72px;

    display:grid;
    place-items:center;

    background:rgba(24,24,30,.55);
    backdrop-filter:blur(14px);

    border:1px solid rgba(80,150,255,.35);
    border-radius:20px;

    box-shadow:
        0 10px 30px rgba(0,0,0,.35);

    transition:
        transform .25s ease,
        box-shadow .25s ease,
        border-color .25s ease;
}

.logo-card:hover{
    transform:translateY(-4px);
    border-color:#4d9fff;

    box-shadow:
        0 18px 45px rgba(59,130,246,.35),
        0 0 25px rgba(59,130,246,.25);
}

#logo{
    width:60px;
    height:60px;
    object-fit:contain;
}

.discord-card {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;

    width: 130px;
    height: 45px;

    border-radius: 12px;

    background: rgba(24,24,30,.55);
    backdrop-filter: blur(14px);

    border: 1px solid rgba(80,150,255,.35);

    color: white;
    text-decoration: none;

    font-size: 1.4rem;
    font-weight: 600;
    position: absolute;
    bottom: 10px;
    right: 10px;
    transition: .25s ease;
}

.discord-card img {
    width: 25px;
    height: 25px;
}

.discord-card:hover {
    transform: translateY(-4px);
    border-color: #5865F2;

    box-shadow:
        0 10px 30px rgba(88,101,242,.35);
}
.container {
    visibility: hidden;
    background-color: #121212da;
    position: absolute;
    width: 100%;
    backdrop-filter: blur(4px);
    height: 100%;
    top: 0;
    left: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
}
.play {
    width: 400px;
    height: 20vh;
    background-color: rgb(19, 19, 19);
    border: #4d9fff 1px solid;
    border-radius: 15px;
    z-index: 1000;
}
.select {
    width: 400px;
    height: 29vh;
    background-color: rgb(19, 19, 19);
    border: #4d9fff 1px solid;
    border-radius: 15px;
    z-index: 1000;
}
.button {
    padding: 10px;
    cursor: pointer;
    background-color: #141414;
    border: #4d9fff 1px solid;
    color: white;
    font-size: large;
    font-weight: 500;
    border-radius: 8px;
    box-shadow: none;
    transition: box-shadow 0.3s ease-in-out;
}
.button:hover {
    box-shadow: 0 0 0 rgba(83, 149, 255, 0.773),
        0 0 25px rgba(82, 148, 255, 0.467);
}
.basicButton {
    padding: 10px;
    cursor: pointer;
    color: white;
    font-size: large;
    font-weight: 500;
    border-radius: 8px;
    box-shadow: none;
}

.buttonS1 {
    background-color: #0067033a !important;
    border: #24a700 1px solid;
    transition: box-shadow 0.3s ease-in-out, backgound-color 0.3s ease-in-out;
    box-shadow: none;
}
.buttonS1:hover {
    background-color: #0a670069 ;
    box-shadow: 0 0 0 rgba(123, 255, 83, 0.773),
        0 0 25px rgba(120, 255, 82, 0.467);
}

.buttonS2 {
    background-color: #6700003a;
    border: #a70000 1px solid;
    transition: box-shadow 0.3s ease-in-out, backgound-color 0.3s ease-in-out;
    box-shadow: none;
}
.buttonS2:hover {
    background-color: #67000069;
    box-shadow: 0 0 0 rgba(255, 83, 83, 0.773),
        0 0 25px rgba(255, 82, 82, 0.467);
}

.buttonS3 {
    background-color: #6734003a;
    border: #a76700 1px solid;
    transition: box-shadow 0.3s ease-in-out, backgound-color 0.3s ease-in-out;
    box-shadow: none;
}
.buttonS3:hover {
    background-color: #673e0069;
    box-shadow: 0 0 0 rgba(255, 157, 83, 0.773),
        0 0 25px rgba(255, 183, 82, 0.467);
}

.buttonS4 {
    background-color: #0046673a;
    border: #4d9fff 1px solid;
    transition: box-shadow 0.3s ease-in-out, backgound-color 0.3s ease-in-out;
    box-shadow: none;
}
.buttonS4:hover {
    background-color: #003e6769;
    box-shadow: 0 0 0 rgba(83, 155, 255, 0.773),
        0 0 25px rgba(82, 163, 255, 0.467);
}

.buttonS5 {
    background-color: #2100673a;
    border: #3604a2 1px solid;
    transition: box-shadow 0.3s ease-in-out, backgound-color 0.3s ease-in-out;
    box-shadow: none;
}
.buttonS5:hover {
    background-color: #21006780;
    box-shadow: 0 0 0 rgba(152, 83, 255, 0.773),
        0 0 25px rgba(166, 82, 255, 0.467);
}

.buttonS6 {
    background-color: #4a00673a;
    border: #7d00a7 1px solid;
    transition: box-shadow 0.3s ease-in-out, backgound-color 0.3s ease-in-out;
    box-shadow: none;
}
.buttonS6:hover {
    background-color: #4a00677d;
    box-shadow: 0 0 0 rgba(209, 83, 255, 0.773),
        0 0 25px rgba(203, 82, 255, 0.467);
}

h2 {
    width: 100%;
    text-shadow: 0 0 10px #5395ff, 0 0 25px rgba(82, 149, 255, 0.769)
}
input {
    padding: 10px;
    background-color: #141414;
    border: 1px solid #4d9fff;
    color: white;
    font-size: large;
    font-weight: 500;
    border-radius: 8px;
    outline: none;
    transition: background-color 0.3s ease-in-out, border 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
    box-shadow: 0 0 10px rgba(77, 159, 255, 0.35);
}

input::placeholder {
    color: #888;
}

input:focus {
    border-color: #6db2ff;
    box-shadow: 0 0 0 rgba(83, 149, 255, 0.773),
        0 0 25px rgba(82, 148, 255, 0.467);
}
.customcard {
    background: linear-gradient(
        45deg,
        #0000004f,
        #8f8f8f5a,
        #0000004f
    );
    background-size: 350% 150%;
}
.exit {
    box-shadow: none;
    transition: box-shadow 0.3s ease-in-out;
}
.exit:hover {
box-shadow:
    0 0 0 rgba(172, 106, 0, 0.773),
    0 0 25px rgba(173, 107, 0, 0.467);
}
.customcard:hover {
    background-position: right center;
}
.selectionGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div id="playContainer" class="container">
    <div class="play">
        <div style="display: flex;">
            <h2 style="margin-left: 45px; margin-top: 1.1vh; text-align: center;">Play</h2>
            <button onclick="showPlay();" class="exit" style="cursor: pointer; position: relative; top: 10px; right: 10px; background: transparent; border: 1px solid black; filter: invert(1); border-radius: 7px; width: 50px; height: 43px;">
                <img style="width: 40px; height: 40px;" src="file:///home/nathan/Downloads/other/Trype/close-icon.png">
            </button>
        </div>
        <div style="margin-top: 10%; display: flex;justify-content: center;"><input id="lobbyName" type="text" placeholder="Lobby Name"></div>
        <div style="margin-top: 5%; padding: 20px; display: flex;justify-content: center;"><button onclick="play();"class="button">Play</button></div>
    </div>
</div>
<div id="selectContainer" class="container">
    <div class="select">
        <div style="display: flex;">
            <h2 style="margin-left: 45px; margin-top: 1.1vh; text-align: center;">Play</h2>
            <button onclick="showSelect();" class="exit" style="cursor: pointer; position: relative; top: 10px; right: 10px; background: transparent; border: 1px solid black; filter: invert(1); border-radius: 7px; width: 50px; height: 43px;">
                <img style="width: 40px; height: 40px;" src="file:///home/nathan/Downloads/other/Trype/close-icon.png">
            </button>
        </div>
        <div style="margin-top: 10%; display: flex;justify-content: center;"><input id="lobbyName" type="text" placeholder="Lobby Name"></div>
        <div class="selectionGrid">    
            <div style="padding: 20px; display: flex;justify-content: center;"><button onclick="gamemode='bedwars_solo'; play();"class="buttonS1 basicButton">Play Solos</button></div>
            <div style="padding: 20px; display: flex;justify-content: center;"><button onclick="gamemode='bedwars_duo'; play();"class="buttonS2 basicButton">Play Duos</button></div>
            <div style="padding: 20px; display: flex;justify-content: center;"><button onclick="gamemode='bedwars_trio'; play();"class="buttonS3 basicButton">Play Trios</button></div>
            <div style="padding: 20px; display: flex;justify-content: center;"><button onclick="gamemode='bedwars_4v4v4v4'; play();"class="buttonS4 basicButton">Play Squads</button></div>
            <div style="padding: 20px; display: flex;justify-content: center;"><button onclick="gamemode='bedwars_4v4'; play();"class="buttonS5 basicButton">Play 4v4</button></div>
            <div style="padding: 20px; display: flex;justify-content: center;"><button onclick="gamemode='bedwars_1v1'; play();"class="buttonS6 basicButton">Play 1v1</button></div>
        </div>
    </div>
</div>
<div class="titlediv">
    <div class="logo-card">
        <img id="logo" src="file:///home/nathan/Downloads/LogoTransparent-removebg-preview.png">
    </div>
    <h1 id="title">Trype</h1>
</div>

<div class="selection">
    <div class="card" onclick="gamemode = 'classic_survival'; showPlay();" style="background-image: url('https://bloxd.io/textures/games/classic_survival/bloxd_survival_thumbnail_small.jpg');"></div>
    <div class="card" onclick="gamemode = 'pirates'; showPlay();" style="background-image: url('https://bloxd.io/textures/games/pirates/bloxd_pirates_thumbnail_small_2.jpg');"></div>
    <div class="card" onclick="showSelect();" style="background-image: url('https://bloxd.io/textures/games/bedwars/bloxd_bedwars_thumbnail_small_2.jpg');"></div>
    <div class="card"onclick="gamemode = 'classic_playerSchematic|7265tlrcjgORi6tVOvsBp'; showPlay();" style="background-size: cover; background-image: url('https://cdn.bloxd.io/customThumbnails/8gV_vUxF8MoYXPCPizF3n.jpg');"></div>
    <div class="card"onclick="gamemode = 'classic_smp2';showPlay();"style="background-size: cover; background-image: url('https://bloxd.io/textures/games/classic_smp2/bloxd_smp2_thumbnail_small.jpg');"></div>
    <div class="card customcard" style="user-select: none;text-align: center; justify-content: center;"><span style="font-size: 150px;">+</span></div>
</div>
<a class="discord-card" href="https://discord.gg/dTKvNQEFpG">
    <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/discord-color-icon.png" alt="Discord">
    <span style="font-size: 20px;">Discord</span>
</a>
</body>
</html>
<script>
let wallpapers = [
    "file2.jpg",
    "file.png",
    "file3.png",
    "file4.png",
    "file5.png",
    "file6.png"
]
document.getElementsByClassName('bg')[0].style.background = `linear-gradient(rgba(8, 12, 22, 0.87),rgba(8, 12, 22, 0.59)), url('${wallpapers[Math.floor(Math.random() * 7)]}')`;
let gamemode = undefined;
let playShown = 0;
let selectShown = 0;
function showPlay() {
    if (playShown == 0) {
        playShown = 1;
        document.getElementById('playContainer').style.visibility = 'visible';
    } else {
        playShown = 0;
        document.getElementById('playContainer').style.visibility = 'hidden';
    }
}
function showSelect() {
    if (selectShown == 0) {
        selectShown = 1;
        document.getElementById('selectContainer').style.visibility = 'visible';
    } else {
        selectShown = 0;
        document.getElementById('selectContainer').style.visibility = 'hidden';
    }
}
function play() {
    let lobby = document.getElementById('lobbyName').value;
    window.location.href = `https://bloxd.io/play/${gamemode}/${lobby}`;
}
</script>
